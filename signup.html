<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Înregistrare Angajat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card login-card shadow">
        <h3 class="text-center mb-4">Înregistrare Angajat</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/signup">
            <div class="mb-3">
                <label class="form-label">Nume și Prenume (Real)</label>
                <input type="text" name="nume" class="form-control" placeholder="ex: Popescu Ion" required>
                <div class="form-text">Acest nume va apărea în fișele de inventar.</div>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Username (pentru login)</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Parolă</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            
            <button type="submit" class="btn btn-success w-100 mb-3">Creează Cont</button>
            <div class="text-center">
                <a href="/login" class="text-decoration-none">Ai deja cont? Loghează-te</a>
            </div>
        </form>
    </div>
</body>
</html>
